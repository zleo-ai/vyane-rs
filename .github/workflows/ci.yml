name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4 (resolved from the official repository).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Test release authorization gate
        run: bash .github/scripts/test-release-gate.sh

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv-1.85.0

      - name: Check minimum supported Rust version
        run: cargo check --workspace --all-targets --locked

  test:
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        # macOS exposes its default temporary directory through /var, which is
        # a symlink to /private/var. Security tests intentionally reject database
        # paths that traverse symlinks, so use the runner's canonical temp root.
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # Several CLI fixtures exercise process-global POSIX locking from
            # independent Tokio runtimes. Keep each fixture's internal
            # concurrency, but do not overlap separate CLI fixtures on macOS.
            # Other packages retain normal scheduling (including paused-time
            # tests that rely on Tokio's automatic clock advancement).
            cargo test --workspace --exclude vyane-cli
            cargo test -p vyane-cli -- --test-threads=1
          else
            cargo test --workspace
          fi

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      # taiki-e/install-action v2.83.1 (resolved from the official repository).
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-llvm-cov

      # Measurement only for now: report the summary, no threshold gate.
      - name: Coverage summary
        run: cargo llvm-cov --workspace --summary-only
