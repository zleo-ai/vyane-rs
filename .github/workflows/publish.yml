name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Publish (dry run)
        run: cargo publish --dry-run -p vyane-core

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Publish in dependency order. The workspace uses path dependencies,
        # so `cargo publish` resolves them from the registry once published.
        run: |
          cargo publish -p vyane-core -p vyane-provider -p vyane-config || true
          cargo publish -p vyane-protocol -p vyane-harness -p vyane-ledger || true
          cargo publish -p vyane-kernel -p vyane-router || true
          cargo publish -p vyane-service -p vyane-workflow || true
          cargo publish -p vyane-mcp || true
          cargo publish -p vyane-cli || true
